name: Update World Cup Results
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fetch results and patch App.js
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-results.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "wc-results-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain src/App.js)" ]]; then
            git add src/App.js
            git commit -m "Auto-update World Cup results"
            git push
          else
            echo "No changes to commit."
          fi
